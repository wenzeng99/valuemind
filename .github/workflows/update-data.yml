name: Update Market Data

on:
  schedule:
    # US market hours (ET → UTC), weekdays only
    - cron: '30 14 * * 1-5'   # Market open  9:30 AM ET = UTC 14:30
    - cron: '0 21 * * 1-5'    # Market close 4:00 PM ET = UTC 21:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm install
      - run: pip install yfinance

      # Step 1: Fetch all raw data (market prices, news, stock details)
      - name: Fetch market data
        run: node scripts/fetch-data.mjs

      # Step 2: Merge real financial data into stock-analysis.json
      - name: Update analysis with real data
        run: node scripts/update-analysis.mjs

      # Step 3: Commit updated data
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: auto-sync market data [skip ci]'
          file_pattern: 'data/*.json'

      # Step 4: Deploy to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=valuemind --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
